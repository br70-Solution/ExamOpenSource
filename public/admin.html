<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Admin</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
<div id="admin-login" class="page-wrapper">
  <div class="card card-lg fade-in">
    <div class="uni-header"><div class="uni-name">Espace Professeur</div><div class="divider"></div></div>
    <div id="alert" class="alert alert-error"></div>
    <div class="form-group"><input type="password" id="pass" class="form-control" placeholder="Mot de passe administrateur"></div>
    <button class="btn btn-primary" onclick="login()">CONNEXION</button>
    <p class="text-center mt-2"><a href="/" style="color:var(--text-muted);font-size:0.85rem;text-decoration:none">← Retour à l'examen</a></p>
  </div>
</div>
<div id="dashboard" class="hidden" style="padding:24px;max-width:1100px;margin:0 auto">
  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;margin-bottom:24px">
    <div><h2 style="color:var(--primary)">📊 Résultats des Étudiants</h2><p class="subtitle">Actualisation automatique toutes les 10s</p></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-secondary btn-sm" onclick="load()">🔄 Actualiser</button>
      <button class="btn btn-danger btn-sm" onclick="document.getElementById('cm').classList.add('active')">🗑️ Supprimer</button>
    </div>
  </div>
  <div id="stats" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:20px"></div>
  <div class="card card-full">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <h3>Liste des candidats</h3>
      <div style="display:flex;gap:8px"><input type="text" id="search" class="form-control" placeholder="Rechercher..." style="max-width:200px;padding:8px 12px;font-size:0.85rem" oninput="filter()"><button class="btn btn-secondary btn-sm" onclick="csv()">📥 CSV</button></div>
    </div>
    <div style="overflow-x:auto"><table class="results-table"><thead><tr><th>#</th><th>Nom</th><th>Groupe</th><th>Note</th><th>/20</th><th>%</th><th>Statut</th><th>Durée</th></tr></thead><tbody id="tbody"></tbody></table></div>
    <p id="empty" class="text-center subtitle mt-2 hidden">Aucun résultat</p>
  </div>
</div>
<div class="modal-overlay" id="cm"><div class="card modal"><h3>⚠️ Supprimer toutes les données ?</h3><p class="subtitle mt-2">Étudiants, réponses et notes supprimés. <strong>Irréversible.</strong></p><div class="modal-actions"><button class="btn btn-secondary" onclick="document.getElementById('cm').classList.remove('active')">Annuler</button><button class="btn btn-danger" onclick="cleanup()">Supprimer</button></div></div></div>
<script>
let pw='',all=[];
document.getElementById('pass').addEventListener('keyup',e=>{if(e.key==='Enter')login()});
function login(){pw=document.getElementById('pass').value;fetch('/api/results',{headers:{'X-Admin-Password':pw}}).then(r=>{if(!r.ok)throw 0;return r.json()}).then(()=>{document.getElementById('admin-login').classList.add('hidden');document.getElementById('dashboard').classList.remove('hidden');load();setInterval(load,10000)}).catch(()=>{const a=document.getElementById('alert');a.textContent='Mot de passe incorrect';a.classList.add('show')})}
async function load(){try{const r=await fetch('/api/results',{headers:{'X-Admin-Password':pw}});const d=await r.json();all=d.results||[];stats();render(all)}catch(e){}}
function stats(){const sub=all.filter(r=>r.submitted),act=all.filter(r=>!r.submitted);const avg=sub.length?Math.round(sub.reduce((s,r)=>s+(r.total_questions?(r.score/r.total_questions)*100:0),0)/sub.length):0;const pass=sub.filter(r=>r.total_questions&&(r.score/r.total_questions)>=0.5).length;document.getElementById('stats').innerHTML=`<div class="card" style="padding:14px;text-align:center"><div style="font-size:1.6rem;font-weight:800;color:var(--primary)">${sub.length}</div><div style="font-size:0.75rem;color:var(--text-muted)">Terminés</div></div><div class="card" style="padding:14px;text-align:center"><div style="font-size:1.6rem;font-weight:800;color:var(--warning)">${act.length}</div><div style="font-size:0.75rem;color:var(--text-muted)">En cours</div></div><div class="card" style="padding:14px;text-align:center"><div style="font-size:1.6rem;font-weight:800;color:var(--success)">${avg}%</div><div style="font-size:0.75rem;color:var(--text-muted)">Moyenne</div></div><div class="card" style="padding:14px;text-align:center"><div style="font-size:1.6rem;font-weight:800;color:var(--primary)">${pass}/${sub.length}</div><div style="font-size:0.75rem;color:var(--text-muted)">Réussis ≥50%</div></div>`}
function render(data){const tb=document.getElementById('tbody'),em=document.getElementById('empty');if(!data.length){tb.innerHTML='';em.classList.remove('hidden');return}em.classList.add('hidden');tb.innerHTML=data.map((r,i)=>{const p=r.total_questions?Math.round((r.score/r.total_questions)*100):0;const n20=r.total_questions?((r.score/r.total_questions)*20).toFixed(2):'—';let b,c;if(!r.submitted){b='En cours';c='badge-active'}else if(p>=50){b='Réussi';c='badge-success'}else{b='Échoué';c='badge-danger'}let dur='—';if(r.start_time&&r.end_time){dur=Math.round((new Date(r.end_time)-new Date(r.start_time))/60000)+' min'}else if(!r.submitted){dur=(r.answered_count||0)+' rép.'}return`<tr><td>${i+1}</td><td><strong>${r.full_name}</strong></td><td>${r.group_number}</td><td>${r.submitted?r.score+'/'+r.total_questions:'—'}</td><td><strong>${r.submitted?n20:'—'}</strong></td><td>${r.submitted?p+'%':'—'}</td><td><span class="badge ${c}">${b}</span></td><td>${dur}</td></tr>`}).join('')}
function filter(){const q=document.getElementById('search').value.toLowerCase();render(all.filter(r=>r.full_name.toLowerCase().includes(q)||r.group_number.toLowerCase().includes(q)))}
async function cleanup(){document.getElementById('cm').classList.remove('active');await fetch('/api/cleanup',{method:'DELETE',headers:{'X-Admin-Password':pw}});all=[];stats();render([])}
function csv(){const sub=all.filter(r=>r.submitted);if(!sub.length){alert('Rien à exporter');return}let c='Nom,Groupe,Note,Total,Note_sur_20,Pourcentage,Statut\n';sub.forEach(r=>{const p=r.total_questions?Math.round((r.score/r.total_questions)*100):0;const n20=r.total_questions?((r.score/r.total_questions)*20).toFixed(2):'0';c+=`"${r.full_name}","${r.group_number}",${r.score},${r.total_questions},${n20},${p}%,${p>=50?'Réussi':'Échoué'}\n`});const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+c],{type:'text/csv;charset=utf-8;'}));a.download=`resultats_${new Date().toISOString().slice(0,10)}.csv`;a.click()}
</script>
</body></html>
